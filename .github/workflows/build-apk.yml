name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get
        working-directory: reasonix_mobile

      - name: Build APK
        run: flutter build apk --release
        working-directory: reasonix_mobile

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: reasonix-mobile-apk
          path: reasonix_mobile/build/app/outputs/flutter-apk/app-release.apk
